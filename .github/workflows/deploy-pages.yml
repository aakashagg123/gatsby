name: Deploy learning site to GitHub Pages

on:
  push:
    branches: ["claude/ai-engineering-learning-repo-fbmgw7"]
    paths:
      - "html/**"
      - "scripts/build_html.py"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild HTML from the markdown source
        run: |
          python -m pip install --quiet markdown pygments
          python scripts/build_html.py

      - name: Place content under /html/ path
        run: |
          mkdir -p _site/html
          cp -r html/. _site/html/
          cp _site/html/index.html _site/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
