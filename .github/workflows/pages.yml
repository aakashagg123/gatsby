# Deploy the combined learning site to GitHub Pages.
#
# scripts/build_site.py assembles _site/ with two separate landings:
#   _site/index.html      → AI Engineering | Harness Engineering
#   _site/ai/             → the pre-rendered AI engineering editions (html/)
#   _site/harness/        → the harness engineering track (rendered client-side)
# It is pure stdlib (copy files + write viewers), so the deploy can't fail on a
# missing dependency.
#
# One-time setup: in the repo, go to Settings → Pages → Build and deployment →
# Source: "GitHub Actions". Then this workflow publishes on every push to master.
name: Deploy learning site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build combined site
        run: python3 scripts/build_site.py
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
