# ---
# name: embedded-engine-settings
# description: Minimal Spring Boot settings for an embedded Flowable engine
# kind: settings
# phase: 02
# lesson: 05
# ---

# The engine shares your app's datasource — same DB, same transactions.
spring.datasource.url=jdbc:h2:file:./flowable-db;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=

# Create/upgrade engine tables on startup (use 'false' + migration scripts in prod).
flowable.database-schema-update=true

# The job executor (Phase 2, lesson 04) — on by default; shown for explicitness.
flowable.async-executor-activate=true

# Keep full audit trail while learning; revisit in Phase 9 (history levels).
flowable.history-level=full

# Auto-deploy every model found in src/main/resources/processes/
flowable.check-process-definitions=true
