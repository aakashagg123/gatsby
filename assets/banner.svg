<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI Engineering — From Scratch to Production">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FAF9F5"/>
      <stop offset="1" stop-color="#F0EEE6"/>
    </linearGradient>
    <style>
      .display { font-family: 'Iowan Old Style','Palatino Linotype','Palatino','Georgia',serif; }
      .sans { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; }
    </style>
  </defs>

  <rect width="1280" height="340" fill="url(#bg)"/>
  <rect width="1280" height="6" fill="#D97757"/>

  <!-- spark mark -->
  <g transform="translate(96,118)">
