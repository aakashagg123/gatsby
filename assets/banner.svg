    <path d="M52 14 L60 44 L90 52 L60 60 L52 90 L44 60 L14 52 L44 44 Z" fill="#D97757"/>
  </g>

  <text x="248" y="140" class="display" font-size="58" font-weight="600" fill="#181818">AI Engineering</text>
